<!DOCTYPE html>
<html>
<head>
    <title>WebRTC Tunnel Client</title>
</head>
<body>
    <h2>WebRTC Tunnel Client</h2>
    
    <div>
        <label>
            <input type="radio" name="inputType" value="json" checked> 
            Обычный JSON
        </label>
        <label>
            <input type="radio" name="inputType" value="hex"> 
            HEX (где D это X, 0 это T)
        </label>
    </div>
    <br>
    
    <div>
        <textarea id="offer" rows="10" cols="80" placeholder="Вставь сюда offer из терминала"></textarea>
        <br/>
        <button id="connect">Подключиться</button>
    </div>
    <div>
        <h3>Ответ (answer):</h3>
        <textarea id="answer" rows="5" cols="80" readonly></textarea>
        <p id="status">Не подключено</p>
    </div>
    <hr/>
    <div>
        <input type="text" id="url" value="/" size="50" placeholder="URL (например / или /api/data)"/>
        <button id="send">Запросить</button>
    </div>
    <div id="output" style="border:1px solid #ccc; padding:10px; margin-top:10px;"></div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js "></script>
    <script>
        let dataChannel = null;
        let peerConnection = null;

        function hexToBytes(hexStr) {
            // Заменяем кириллические символы, похожие на латинские
            const latinized = hexStr
                .replace(/А/g, 'A')  // кириллическая А -> латинская A
                .replace(/В/g, 'B')  // кириллическая В -> латинская B
                .replace(/в/g, 'B')  // кириллическая В -> латинская B
                .replace(/С/g, 'C')  // кириллическая С -> латинская C
                .replace(/с/g, 'C')  // кириллическая С -> латинская C
                .replace(/Е/g, 'E')  // кириллическая Е -> латинская E

                // D:
                .replace(/Х/g, 'D')  // кириллическая Х -> D
                .replace(/х/g, 'D')  // кириллическая х -> D
                .replace(/X/g, 'D')  // английская X -> D
                .replace(/x/g, 'D')  // английская x -> D

                // T:
                .replace(/T/g, '0')
                .replace(/Т/g, '0');
            
            // Удаляем все не-hex символы (пробелы, дефисы, переводы строк, табы и т.д.)
            const cleaned = latinized.replace(/[^0-9a-fA-F]/g, '');
            
            if (cleaned.length % 2 !== 0) {
                throw new Error('Нечётное количество hex-символов');
            }
            
            const bytes = new Uint8Array(cleaned.length / 2);
            for (let i = 0; i < cleaned.length; i += 2) {
                bytes[i / 2] = parseInt(cleaned.substring(i, i + 2), 16);
            }
            return bytes;
        }

        function bytesToString(bytes) {
            return new TextDecoder().decode(bytes);
        }

        document.getElementById('connect').onclick = async () => {
            const rawInput = document.getElementById('offer').value;
            if (!rawInput) {
                alert('Вставь offer из терминала');
                return;
            }

            const inputType = document.querySelector('input[name="inputType"]:checked').value;
            let offerSdp;

            try {
                if (inputType === 'hex') {
                    const decodedBytes = hexToBytes(rawInput);
                    offerSdp = bytesToString(decodedBytes);
                } else {
                    offerSdp = rawInput;
                }

                const offer = JSON.parse(offerSdp);
                
                peerConnection = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel();
                };

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log('ICE candidate:', event.candidate);
                    }
                };

                await peerConnection.setRemoteDescription(offer);
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                document.getElementById('answer').value = JSON.stringify(peerConnection.localDescription);
                document.getElementById('status').innerHTML = 'Подключено, скопируй answer в терминал';
            } catch (err) {
                alert('Ошибка: ' + err.message);
                console.error(err);
            }
        };

        function setupDataChannel() {
            dataChannel.onopen = () => {
                document.getElementById('status').innerHTML = 'Канал открыт, можно отправлять запросы';
            };
            
            dataChannel.onmessage = (event) => {
                document.getElementById('output').innerHTML = event.data;
            };
            
            dataChannel.onerror = (error) => {
                console.error('Ошибка:', error);
            };
        }

        document.getElementById('send').onclick = () => {
            if (!dataChannel || dataChannel.readyState !== 'open') {
                alert('Канал не открыт');
                return;
            }
            const url = document.getElementById('url').value;
            dataChannel.send(url);
            document.getElementById('output').innerHTML = 'Загрузка...';
        };
    </script>
</body>
</html>
