<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTC Tunnel Client (Initiator)</title>
</head>
<body>
    <h2>WebRTC Tunnel — Browser initiates</h2>
    
    <div>
        <label>
            <input type="radio" name="outputType" value="json" checked> 
            Обычный JSON
        </label>
        <label>
            <input type="radio" name="outputType" value="hex"> 
            HEX
        </label>
    </div>
    <br>
    
    <button id="createOffer">Создать Offer</button>
    <br><br>
    <h3>Offer (скопируй в терминал RPi):</h3>
    <textarea id="offer" rows="5" cols="80" readonly></textarea>
    
    <hr>
    
    <div>
        <label>
            <input type="radio" name="inputType" value="json" checked> 
            Обычный JSON
        </label>
        <label>
            <input type="radio" name="inputType" value="hex"> 
            HEX
        </label>
    </div>
    <br>
    
    <h3>Вставь answer из RPi:</h3>
    <textarea id="answer" rows="5" cols="80" placeholder="Вставь сюда answer из терминала"></textarea>
    <br>
    <button id="connect">Подключиться</button>
    
    <p id="status">Не подключено</p>
    <pre id="iceLog" style="border:1px solid #ccc; padding:10px; max-height:200px; overflow:auto; font-size:10px;"></pre>
    
    <hr>
    <input type="text" id="url" value="/" size="50" placeholder="URL (например / или /api/data)"/>
    <button id="send">Запросить</button>
    <div id="output" style="border:1px solid #ccc; padding:10px; margin-top:10px;"></div>

    <script>
        let dataChannel = null;
        let peerConnection = null;

        function log(msg) {
            console.log(msg);
            document.getElementById('iceLog').innerHTML += msg + '\n';
        }

        function hexToBytes(hexStr) {
            const cleaned = hexStr.replace(/[^0-9a-fA-F]/g, '');
            if (cleaned.length % 2 !== 0) {
                throw new Error('Нечётное количество hex-символов');
            }
            const bytes = new Uint8Array(cleaned.length / 2);
            for (let i = 0; i < cleaned.length; i += 2) {
                bytes[i / 2] = parseInt(cleaned.substring(i, i + 2), 16);
            }
            return bytes;
        }

        function bytesToString(bytes) {
            return new TextDecoder().decode(bytes);
        }

        document.getElementById('createOffer').onclick = async () => {
            // === РАБОЧИЕ STUN-СЕРВЕРЫ ===
            peerConnection = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun.sipgate.net:10000' },
                    { urls: 'stun:stun.ekiga.net:3478' },
                ]
            });
            
            // === ЛОГИРОВАНИЕ СОСТОЯНИЯ ===
            peerConnection.onconnectionstatechange = () => {
                log('Connection state: ' + peerConnection.connectionState);
                document.getElementById('status').innerHTML = peerConnection.connectionState;
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                log('ICE state: ' + peerConnection.iceConnectionState);
            };
            
            peerConnection.onsignalingstatechange = () => {
                log('Signaling state: ' + peerConnection.signalingState);
            };
            
            dataChannel = peerConnection.createDataChannel('http-tunnel');
            setupDataChannel();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Ждём ICE gathering с логами
            await new Promise(resolve => {
                peerConnection.onicecandidate = (e) => {
                    if (e.candidate) {
                        log('Local ICE: ' + e.candidate.candidate);
                    } else {
                        log('ICE gathering complete');
                        resolve();
                    }
                };
                setTimeout(() => {
                    log('ICE gathering timeout');
                    resolve();
                }, 10000);
            });
            
            const outputType = document.querySelector('input[name="outputType"]:checked').value;
            const sdp = JSON.stringify(peerConnection.localDescription);
            
            if (outputType === 'hex') {
                const bytes = new TextEncoder().encode(sdp);
                const hex = Array.from(bytes)
                    .map(b => b.toString(16).padStart(2, '0').toUpperCase())
                    .join('-');
                document.getElementById('offer').value = hex;
            } else {
                document.getElementById('offer').value = sdp;
            }
        };

        document.getElementById('connect').onclick = async () => {
            const rawInput = document.getElementById('answer').value;
            if (!rawInput) {
                alert('Вставь answer из терминала');
                return;
            }

            const inputType = document.querySelector('input[name="inputType"]:checked').value;
            let answerSdp;

            try {
                if (inputType === 'hex') {
                    const decodedBytes = hexToBytes(rawInput);
                    answerSdp = bytesToString(decodedBytes);
                } else {
                    answerSdp = rawInput;
                }

                const answer = JSON.parse(answerSdp);
                
                // Логируем remote кандидаты из answer
                log('Setting remote description...');
                await peerConnection.setRemoteDescription(answer);
                
                // Парсим кандидаты из SDP для логов
                const candidates = answer.sdp.match(/a=candidate:[^\r\n]+/g) || [];
                candidates.forEach(c => log('Remote ICE: ' + c));
                
                document.getElementById('status').innerHTML = 'Подключение...';
            } catch (err) {
                alert('Ошибка: ' + err.message);
                console.error(err);
            }
        };

        function setupDataChannel() {
            dataChannel.onopen = () => {
                log('DataChannel OPEN');
                document.getElementById('status').innerHTML = 'Канал открыт!';
            };
            dataChannel.onmessage = (e) => {
                document.getElementById('output').innerHTML = e.data;
            };
            dataChannel.onerror = (error) => {
                log('DataChannel ERROR: ' + error);
            };
            dataChannel.onclose = () => {
                log('DataChannel CLOSED');
            };
        }

        document.getElementById('send').onclick = () => {
            if (!dataChannel || dataChannel.readyState !== 'open') {
                alert('Канал не открыт');
                return;
            }
            const url = document.getElementById('url').value;
            dataChannel.send(url);
            document.getElementById('output').innerHTML = 'Загрузка...';
        };
    </script>
</body>
</html>
